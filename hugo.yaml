baseURL: https://n0m0r3pa1n.github.io/georgimirchev-blog/
languageCode: en
title: Make Things Happen
theme: PaperMod
taxonomies:
  category: categories
  tag: tags
params:
  description: All about programming
  defaultTheme: auto
  disableThemeToggle: true
  showShareButtons: true
  showReadingTime: true
  showToc: false
  showBreadCrumbs: true
  showCodeCopyButtons: true
  comments: true
  hideFooter: true
  assets:
    favicon: /favicon.ico
    disableHLJS: true
markup:
  highlight:
    codeFences: true
    guessSyntax: true
    style: monokai
  goldmark:
    renderer:
      unsafe: true
outputs:
  home:
    - HTML
    - RSS
    - JSON
outputFormats:
  RSS:
    mediaType: application/rss+xml
    baseName: feed
menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 5
    - identifier: search
      name: Search
      url: /search/
      weight: 10
